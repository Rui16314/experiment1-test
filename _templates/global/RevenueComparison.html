{% extends "global/Layout.html" %}
{% block content %}
  <h2>Revenue Comparison</h2>
  <p>This chart summarizes price (revenue) by session.</p>
  <canvas id="revChart"></canvas>
  <script src="{{ static 'global/chart.js' }}"></script>
  <script>
    (function(){
      var data = {{ revenue_data_json }};  // provide from vars_for_template
      window.renderRevenueChart('revChart', data);
    })();
  </script>
{% endblock %}
